
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--gold:#c9a84c;
--gold-dark:#8a6a1e;
--surface:#fdf8ef;
--surface2:#f5eedc;
--text:#2a1f08;
--muted:#7a6840;
--border:rgba(201,168,76,0.25);
}

body{
font-family:'DM Sans',sans-serif;
background:linear-gradient(135deg, #9c6137, #cc9966, #fffddd,  #fffef6);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:450px;
}

/* BRAND */

.brand{
text-align:center;
margin-bottom:25px;
}

.academy-logo{
width:120px;
height:120px;
object-fit:cover;
border-radius:50%;
border:3px solid #c9a84c;
padding:0px;
background:white;
display:block;
margin:0 auto 0px auto;
box-shadow:0 4px 15px rgba(201,168,76,0.35);
}

.brand-name{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:700;
color:var(--text);
}

.brand-sub{
font-size:12px;
letter-spacing:3px;
color:var(--gold-dark);
margin-top:3px;
}

.brand-tagline{
font-style:italic;
margin-top:6px;
font-size:14px;
color:var(--muted);
}

/* CARD */

.card{
background:white;
border-radius:15px;
border:1px solid var(--border);
overflow:hidden;
box-shadow:0 6px 30px rgba(0,0,0,0.08);
}

/* TABS */

.tabs{
display:flex;
background:var(--surface2);
border-bottom:1px solid var(--border);
}

.tab{
flex:1;
padding:14px;
border:none;
background:none;
font-size:13px;
letter-spacing:1px;
cursor:pointer;
}

.tab.active{
background:white;
color:var(--gold-dark);
border-bottom:2px solid var(--gold);
}

/* FORM */

.form-body{
padding:25px;
}

.field{
margin-bottom:14px;
}

.field label{
font-size:11px;
letter-spacing:1px;
color:var(--muted);
display:block;
margin-bottom:4px;
}

.field input,
.field select{
width:100%;
padding:10px;
border-radius:7px;
border:1px solid rgba(201,168,76,0.3);
font-size:14px;
background:var(--surface);
transition:all .2s ease;
}

.field input:focus,
.field select:focus{
border-color:var(--gold);
background:white;
outline:none;
}

.row-2{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* BUTTON */

.btn-primary{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:7px;
background:linear-gradient(135deg,var(--gold-dark),var(--gold));
color:white;
letter-spacing:2px;
font-size:12px;
cursor:pointer;
}

.btn-primary:hover{
opacity:.9;
}

/* CHECKBOX */

.checkbox-row{
display:flex;
gap:8px;
font-size:12px;
margin-bottom:10px;
}

.form-panel{
display:none;
}

.form-panel.active{
display:block;
}

/* FOOTER */

.card-footer{
padding:14px;
text-align:center;
font-size:13px;
background:var(--surface2);
}

.card-footer a{
cursor:pointer;
color:var(--gold-dark);
}

</style>
</head>

<body>

<div class="container">

<div class="brand">

<img src="logo.jpeg" class="academy-logo" alt="Swarsanskar Logo">

<div class="brand-name">Swarsanskar</div>
<div class="brand-sub">MUSIC ACADEMY</div>
<div class="brand-tagline">स्वरांपासून संस्कारांपर्यंत – A Journey in Music</div>

</div>

<div class="card">

<div class="tabs">
<button class="tab active" onclick="switchTab('signin')">Sign In</button>
<button class="tab" onclick="switchTab('signup')">Sign Up</button>
</div>

<div class="form-body">

<!-- SIGN IN -->

<form class="form-panel active" id="panel-signin">

<div class="field">
<label>Email Address</label>
<input type="email" name="email" placeholder="you@example.com" required>
</div>

<div class="field">
<label>Password</label>
<input type="password" name="password" minlength="8" placeholder="••••••••" required>
</div>

<button type="submit" class="btn-primary">Sign In</button>

</form>

<!-- SIGN UP -->

<form class="form-panel" id="panel-signup">

<div class="row-2">

<div class="field">
<label>First Name</label>
<input type="text" name="firstname" placeholder="Arjun" required>
</div>

<div class="field">
<label>Last Name</label>
<input type="text" name="lastname" placeholder="Sharma" required>
</div>

</div>

<div class="field">
<label>Email</label>
<input type="email" name="email" placeholder="you@example.com" required>
</div>

<div class="field">
<label>Phone</label>
<input type="tel" name="phone" pattern="[0-9]{10}" placeholder="9876543210" required>
</div>

<div class="field">
<label>Course</label>
<select name="course" required>
<option value="">Select course</option>
<option>Hindustani Classical Vocal — Basics</option>
<option>Hindustani Classical Vocal — ABGMV</option>
<option>Pakhwaj Solo</option>
</select>
</div>

<div class="field">
<label>Password</label>
<input type="password" name="password" minlength="8" placeholder="Min 8 characters" required>
</div>

<div class="checkbox-row">
<input type="checkbox" required>
<label>I agree to the Terms and Privacy Policy</label>
</div>

<button type="submit" class="btn-primary">Join the Academy</button>

</form>

</div>

<div class="card-footer" id="footer-text">
New here? <a onclick="switchTab('signup')">Create account →</a>
</div>

</div>

</div>

<script>

function switchTab(tab){

document.querySelectorAll('.tab').forEach((t,i)=>{
t.classList.toggle('active',(tab==='signin'&&i===0)||(tab==='signup'&&i===1))
})

document.getElementById('panel-signin').classList.toggle('active',tab==='signin')
document.getElementById('panel-signup').classList.toggle('active',tab==='signup')

document.getElementById('footer-text').innerHTML=
tab==='signin'
?'New here? <a onclick="switchTab(\'signup\')">Create account →</a>'
:'Already have account? <a onclick="switchTab(\'signin\')">Sign in →</a>'

}

document.querySelectorAll("form").forEach(form=>{
form.addEventListener("submit",function(e){
e.preventDefault()
alert("Form submitted successfully")
})
})

</script>

</body>
</html>
